<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yara</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0b0b0f;
            color: #fff;
            overflow: hidden;
        }

        /* ===== PARTICULAS ===== */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            animation: float 12s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 0;
            }
            to {
                transform: translateY(-10vh);
                opacity: 1;
            }
        }

        /* ===== TELA INICIAL ===== */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1;
            transition: opacity 1s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 3rem;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .btn {
            margin-top: 40px;
            padding: 12px 28px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0;
            animation: fadeIn 2s ease forwards 1s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* ===== SEGUNDA TELA ===== */
        .content {
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        .drawing {
            width: 100%;
            max-width: 280px;
            border-radius: 16px;
            margin-bottom: 25px;
            opacity: 0;
            transform: scale(0.9);
            animation: showUp 1.5s ease forwards;
        }

        @keyframes showUp {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .text {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 2s ease forwards 1s;
            color: rgba(255,255,255,0.85);
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 400px) {
            .title {
                font-size: 2.3rem;
            }
        }
    </style>
</head>

<body>

    <div class="particles" id="particles"></div>

    <!-- Tela inicial -->
    <div class="screen" id="screen1">
        <div class="title">Yara</div>
        <button class="btn" onclick="openGift()">Abrir presente</button>
    </div>

    <!-- Tela final -->
    <div class="screen hidden" id="screen2">
        <div class="content">
            <img src="./desenho.png" class="drawing">

            <div class="text">
                Eu não sou muito bom com sentimentos…<br><br>
                Mas o seu desenho significou muito pra mim. <3
            </div>
        </div>
    </div>

    <script>
        function openGift() {
            document.getElementById("screen1").classList.add("hidden");

            setTimeout(() => {
                document.getElementById("screen2").classList.remove("hidden");
            }, 800);
        }

        // Partículas
        const container = document.getElementById("particles");

        for (let i = 0; i < 40; i++) {
            const p = document.createElement("div");
            p.classList.add("particle");

            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (5 + Math.random() * 10) + "s";
            p.style.opacity = Math.random();

            container.appendChild(p);
        }
    </script>

</body>
</html>
